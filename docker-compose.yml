services:
  app:
    image: ghcr.io/hor1zon777/m3u8preview_r:latest
    container_name: m3u8preview-app
    network_mode: host
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/m3u8preview.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PROXY_SECRET=${PROXY_SECRET}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-Admin123}
      - DEMO_SEED_PASSWORD=${DEMO_SEED_PASSWORD:-Demo1234}
      - PORT=3000
      - CORS_ORIGIN=http://localhost
      - THUMBNAIL_CONCURRENCY=${THUMBNAIL_CONCURRENCY:-5}
    volumes:
      - db-data:/data
      - uploads:/app/packages/server/uploads
      - client-dist:/app/packages/client/dist
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: m3u8preview-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db-data:
    driver: local
  uploads:
    driver: local
  client-dist:
    driver: local
